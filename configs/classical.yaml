dataset:
  path: data/raw/WELFake_Dataset.csv
  version: WELFake_Dataset.csv
  text_column: text
  title_column: title
  combine_title_text: true
  label_column: label
  drop_missing_text: true

preprocessing:
  lowercase: true
  remove_urls: true
  remove_html: true
  min_text_length: 20

features:
  type: tfidf
  max_features: 20000
  ngram_range: [1, 2]
  min_df: 5
  max_df: 0.9
  sublinear_tf: true

model:
  class_weight: balanced
  random_state: 42

models:
  - logistic_regression
  - naive_bayes
  - svm
  - random_forest
  - xgboost

model_configs:
  logistic_regression:
    C: 1.0
    max_iter: 1000
  naive_bayes:
    alpha: 1.0
  svm:
    C: 1.0
    max_iter: 3000
    calibrate: true
    calibration_method: sigmoid
    calibration_cv: 5
  random_forest:
    n_estimators: 100
    max_depth: 30
  xgboost:
    n_estimators: 150
    max_depth: 6
    learning_rate: 0.1

training:
  test_size: 0.2
  random_state: 42
  stratify: true
  deduplicate: true

output:
  model_dir: models/classical
  vectorizer_filename: tfidf_vectorizer.joblib
  classifier_filename: classifier.joblib
  metrics_filename: metrics.json
  metadata_filename: metadata.json
  comparison_csv: model_comparison.csv
  comparison_json: model_comparison.json

deployment:
  model_name: svm

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
