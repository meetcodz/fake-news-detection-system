# Headline-only SVM: trained on article titles alone.
# Used for short inputs (< 150 chars) where full-article TF-IDF is unreliable.
dataset:
  path: data/raw/WELFake_Dataset.csv
  version: WELFake_Dataset.csv
  text_column: title
  title_column: null
  combine_title_text: false
  label_column: label
  drop_missing_text: true

preprocessing:
  lowercase: true
  remove_urls: true
  remove_html: true
  strip_datelines: true
  min_text_length: 5

features:
  type: tfidf
  max_features: 5000
  ngram_range: [1, 2]
  min_df: 3
  max_df: 0.95
  sublinear_tf: true

model:
  class_weight: balanced
  random_state: 42

models:
  - svm

model_configs:
  svm:
    C: 1.0
    max_iter: 3000
    calibrate: true
    calibration_method: sigmoid
    calibration_cv: 5

training:
  test_size: 0.2
  random_state: 42
  stratify: true
  deduplicate: true

output:
  model_dir: models/headline
  vectorizer_filename: tfidf_vectorizer.joblib
  classifier_filename: classifier.joblib
  metrics_filename: metrics.json
  metadata_filename: metadata.json
  comparison_csv: model_comparison.csv
  comparison_json: model_comparison.json

deployment:
  model_name: svm
  # Lowered from 0.50 → 0.45; headline-only model is slightly biased fake
  # due to WELFake containing political fake news that references real institutions.
  fake_threshold: 0.45
  # Predictions in this band are returned as 'uncertain' by the API
  uncertain_band: [0.35, 0.65]

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
